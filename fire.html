<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIRE Pulse | Inflation-Adjusted Retirement Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; scroll-behavior: smooth; }
    .card { background: linear-gradient(145deg, #1f2937, #374151); }
    .toggle-checkbox:checked { right: 0; border-color: #10b981; }
    .toggle-checkbox:checked + .toggle-label { background-color: #10b981; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <div class="max-w-3xl mx-auto px-4 py-12 pb-20">
    <div class="text-center mb-10">
      <h1 class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight">FIRE <span class="text-emerald-500">Pulse</span></h1>
      <p class="text-zinc-400">Plan for freedom. Adjust for reality.</p>
    </div>

    <div class="card rounded-3xl p-6 md:p-10 shadow-2xl border border-zinc-700/50">
      <div class="flex items-center justify-between mb-8 bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
        <div>
          <span class="block text-sm font-semibold">Account for Inflation?</span>
          <span class="text-[10px] text-zinc-500 uppercase tracking-wider">Adjusts results to "Today's Dollars"</span>
        </div>
        <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
          <input type="checkbox" name="toggle" id="inflationToggle" onchange="calculate()" checked class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer"/>
          <label for="inflationToggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-zinc-700 cursor-pointer"></label>
        </div>
      </div>

      <div class="mb-8">
        <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-500 mb-3">Region & Historical Return</label>
        <select id="country" onchange="updateDefaults()" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-emerald-500 appearance-none">
          <option value="NZ" selected>New Zealand (NZD)</option>
          <option value="AU">Australia (AUD)</option>
          <option value="US">United States (USD)</option>
          <option value="UK">United Kingdom (GBP)</option>
          <option value="CA">Canada (CAD)</option>
          <option value="EU">European Union (EUR)</option>
        </select>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm text-emerald-400 font-medium mb-1">Monthly Expenses</label>
          <div class="relative">
            <span class="absolute left-5 top-3.5 text-zinc-500" id="curr1">$</span>
            <input type="number" id="monthlyExpenses" value="4000" oninput="calculate()" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-12 py-3 text-white">
          </div>
        </div>
        <div>
          <label class="block text-sm text-blue-400 font-medium mb-1">Monthly Savings</label>
          <div class="relative">
            <span class="absolute left-5 top-3.5 text-zinc-500" id="curr2">$</span>
            <input type="number" id="monthlySavings" value="1500" oninput="calculate()" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-12 py-3 text-white">
          </div>
        </div>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-8">
        <div>
          <label class="block text-[10px] text-zinc-500 uppercase mb-1">Current Age</label>
          <input type="number" id="currentAge" value="30" oninput="calculate()" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-2 text-sm text-white">
        </div>
        <div>
          <label class="block text-[10px] text-zinc-500 uppercase mb-1">Nest Egg</label>
          <input type="number" id="currentSavings" value="50000" oninput="calculate()" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-2 text-sm text-white">
        </div>
        <div>
          <label class="block text-[10px] text-zinc-500 uppercase mb-1">Mkt Return %</label>
          <input type="number" id="returnRate" value="7.5" step="0.1" oninput="calculate()" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-2 text-sm text-white">
        </div>
        <div>
          <label class="block text-[10px] text-zinc-500 uppercase mb-1">SWR %</label>
          <input type="number" id="withdrawalRate" value="4" step="0.1" oninput="calculate()" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-2 text-sm text-white">
        </div>
      </div>

      <div class="mt-10 grid grid-cols-2 gap-4">
        <div class="bg-zinc-950/50 rounded-2xl p-6 border border-zinc-800 text-center">
          <div class="text-xs uppercase tracking-widest text-zinc-500 mb-1">Target Number</div>
          <div id="fireNumber" class="text-2xl md:text-3xl font-bold text-emerald-400">$0</div>
        </div>
        <div class="bg-zinc-950/50 rounded-2xl p-6 border border-zinc-800 text-center">
          <div class="text-xs uppercase tracking-widest text-zinc-500 mb-1">Years to Reach</div>
          <div id="yearsToRetire" class="text-2xl md:text-3xl font-bold text-white">0</div>
        </div>
      </div>

      <div class="mt-8">
        <canvas id="growthChart" height="180"></canvas>
      </div>

      <div class="mt-10 pt-8 border-t border-zinc-700/50">
        <a id="affiliateLink" href="https://sharesies.com/r/4CRKTR" target="_blank" 
           class="block w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:scale-[1.01] text-center font-bold py-5 rounded-2xl text-xl transition-all">
          Invest with Sharesies
        </a>
      </div>
    </div>
  </div>

  <script>
    let chartInstance;
    const countryConfig = {
      'NZ': { symbol: '$', name: 'Sharesies', url: 'https://sharesies.com/r/4CRKTR', avgReturn: 7.5 },
      'AU': { symbol: '$', name: 'Stake', url: 'https://hellostake.com/', avgReturn: 8.0 },
      'US': { symbol: '$', name: 'Robinhood', url: 'https://robinhood.com/', avgReturn: 10.0 },
      'UK': { symbol: '£', name: 'Trading 212', url: 'https://www.trading212.com/', avgReturn: 6.5 },
      'CA': { symbol: '$', name: 'Wealthsimple', url: 'https://www.wealthsimple.com/', avgReturn: 7.0 },
      'EU': { symbol: '€', name: 'DEGIRO', url: 'https://www.degiro.com/', avgReturn: 6.0 }
    };

    function updateDefaults() {
      const config = countryConfig[document.getElementById('country').value];
      document.getElementById('curr1').innerText = config.symbol;
      document.getElementById('curr2').innerText = config.symbol;
      document.getElementById('returnRate').value = config.avgReturn;
      const link = document.getElementById('affiliateLink');
      link.innerText = `Start Investing with ${config.name}`;
      link.href = config.url;
      calculate();
    }

    function calculate() {
      const currency = countryConfig[document.getElementById('country').value].symbol;
      const inflationEnabled = document.getElementById('inflationToggle').checked;
      
      const monthlyExpenses = parseFloat(document.getElementById('monthlyExpenses').value) || 0;
      const monthlySavings = parseFloat(document.getElementById('monthlySavings').value) || 0;
      const currentSavings = parseFloat(document.getElementById('currentSavings').value) || 0;
      const withdrawalRate = parseFloat(document.getElementById('withdrawalRate').value) / 100;
      
      // Real vs Nominal return calculation
      let annualReturn = parseFloat(document.getElementById('returnRate').value) / 100;
      if (inflationEnabled) {
          annualReturn = annualReturn - 0.03; // Subtract 3% avg inflation
      }
      const monthlyReturnRate = annualReturn / 12;

      const fireNumber = (monthlyExpenses * 12) / withdrawalRate;
      document.getElementById('fireNumber').innerText = currency + Math.round(fireNumber).toLocaleString();

      let balance = currentSavings;
      let months = 0;
      const labels = [];
      const data = [];

      while (balance < fireNumber && months < 1200) {
        balance = balance * (1 + monthlyReturnRate) + monthlySavings;
        months++;
        if (months % 12 === 0) {
          labels.push(`Year ${Math.floor(months/12)}`);
          data.push(Math.round(balance));
        }
      }

      document.getElementById('yearsToRetire').innerText = (months / 12).toFixed(1);

      if (chartInstance) chartInstance.destroy();
      const ctx = document.getElementById('growthChart').getContext('2d');
      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            data: data,
            borderColor: '#10b981',
            tension: 0.4,
            fill: true,
            backgroundColor: 'rgba(16, 185, 129, 0.1)',
            pointRadius: 0
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            y: { display: false },
            x: { grid: { display: false }, ticks: { color: '#71717a', maxTicksLimit: 6 } }
          }
        }
      });
    }

    window.onload = updateDefaults;
  </script>
</body>
</html>
