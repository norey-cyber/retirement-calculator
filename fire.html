<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retirement Number Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .card { background: linear-gradient(145deg, #1f2937, #374151); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen py-8">
  <div class="max-w-2xl mx-auto px-4">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold mb-2">Retirement Number Calculator</h1>
      <p class="text-zinc-400">How much do you need to retire?</p>
    </div>

    <div class="card rounded-3xl p-8 shadow-2xl">
      <!-- Country -->
      <div class="mb-6">
        <label class="block text-sm text-zinc-400 mb-1">Country</label>
        <select id="country" onchange="updateDefaults()" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-white">
          <option value="US">United States (USD)</option>
          <option value="NZ">New Zealand (NZD)</option>
          <option value="AU">Australia (AUD)</option>
          <option value="UK">United Kingdom (GBP)</option>
          <option value="CA">Canada (CAD)</option>
          <option value="EU">European Union (EUR)</option>
        </select>
      </div>

      <div class="grid grid-cols-2 gap-6">
        <div>
          <label class="block text-sm text-zinc-400 mb-1">Current Age</label>
          <input type="number" id="currentAge" value="30" oninput="calculate()" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-white">
        </div>
        <div>
          <label class="block text-sm text-zinc-400 mb-1">Desired Retirement Age</label>
          <input type="number" id="retireAge" value="65" oninput="calculate()" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-white">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-6 mt-6">
        <div>
          <label class="block text-sm text-zinc-400 mb-1">Current Savings</label>
          <div class="relative">
            <span class="absolute left-4 top-3.5 text-zinc-400" id="currency1">$</span>
            <input type="number" id="currentSavings" value="50000" oninput="calculate()" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-10 py-3 text-white">
          </div>
        </div>
        <div>
          <label class="block text-sm text-zinc-400 mb-1">Monthly Savings</label>
          <div class="relative">
            <span class="absolute left-4 top-3.5 text-zinc-400" id="currency2">$</span>
            <input type="number" id="monthlySavings" value="2000" oninput="calculate()" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-10 py-3 text-white">
          </div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-6 mt-6">
        <div>
          <label class="block text-sm text-zinc-400 mb-1">Expected Annual Return %</label>
          <input type="number" id="returnRate" value="7" step="0.1" oninput="calculate()" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-white">
        </div>
        <div>
          <label class="block text-sm text-zinc-400 mb-1">Safe Withdrawal Rate %</label>
          <input type="number" id="withdrawalRate" value="4" step="0.1" oninput="calculate()" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-white">
        </div>
      </div>

      <!-- Slider -->
      <div class="mt-8">
        <label class="block text-sm text-zinc-400 mb-2">Extra Monthly Savings: <span id="extraValue" class="font-semibold text-emerald-400">$0</span></label>
        <input type="range" id="extraSlider" min="0" max="1000" step="50" value="0" oninput="calculate()" class="w-full accent-emerald-500">
      </div>

      <!-- Results -->
      <div class="mt-10 grid grid-cols-3 gap-4 text-center">
        <div class="bg-zinc-900 rounded-2xl p-4">
          <div class="text-xs text-zinc-400">FIRE Number</div>
          <div id="fireNumber" class="text-2xl font-bold text-emerald-400">$0</div>
        </div>
        <div class="bg-zinc-900 rounded-2xl p-4">
          <div class="text-xs text-zinc-400">Years to Retire</div>
          <div id="yearsToRetire" class="text-2xl font-bold">$0</div>
        </div>
        <div class="bg-zinc-900 rounded-2xl p-4">
          <div class="text-xs text-zinc-400">Monthly Income</div>
          <div id="monthlyIncome" class="text-2xl font-bold text-emerald-400">$0</div>
        </div>
      </div>

      <!-- Chart -->
      <div class="mt-8">
        <canvas id="growthChart" height="180"></canvas>
      </div>

      <!-- Button -->
      <a href="https://example.com/invest" target="_blank"
         class="mt-10 block w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-center font-semibold py-4 rounded-2xl text-lg transition-all">
        Start Building My Retirement Portfolio
      </a>

      <p class="text-center text-xs text-zinc-500 mt-6">
        This is for illustration only and is not financial advice.
      </p>
    </div>
  </div>

  <script>
    let chart;
    function calculate() {
      const currentAge = parseFloat(document.getElementById('currentAge').value) || 30;
      const retireAge = parseFloat(document.getElementById('retireAge').value) || 65;
      const currentSavings = parseFloat(document.getElementById('currentSavings').value) || 0;
      const monthlySavings = parseFloat(document.getElementById('monthlySavings').value) || 0;
      const extraSavings = parseFloat(document.getElementById('extraSlider').value) || 0;
      const returnRate = parseFloat(document.getElementById('returnRate').value) / 100 || 0.07;
      const withdrawalRate = parseFloat(document.getElementById('withdrawalRate').value) / 100 || 0.04;

      const yearsToRetire = retireAge - currentAge;
      const totalMonthly = monthlySavings + extraSavings;
      const annualSavings = totalMonthly * 12;

      // Simple compound interest approximation
      let futureValue = currentSavings;
      for (let i = 0; i < yearsToRetire; i++) {
        futureValue = futureValue * (1 + returnRate) + annualSavings;
      }

      const fireNumber = futureValue;
      const monthlyIncome = (fireNumber * withdrawalRate) / 12;

      // Update results
      document.getElementById('fireNumber').textContent = '$' + Math.round(fireNumber).toLocaleString();
      document.getElementById('yearsToRetire').textContent = yearsToRetire + ' Years';
      document.getElementById('monthlyIncome').textContent = '$' + Math.round(monthlyIncome).toLocaleString();
      document.getElementById('extraValue').textContent = '$' + extraSavings;

      // Update chart (simple)
      if (chart) chart.destroy();
      const ctx = document.getElementById('growthChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: Array.from({length: yearsToRetire + 1}, (_, i) => currentAge + i),
          datasets: [{
            label: 'Projected Savings',
            data: Array.from({length: yearsToRetire + 1}, (_, i) => {
              let val = currentSavings;
              for (let y = 0; y < i; y++) val = val * (1 + returnRate) + annualSavings;
              return Math.round(val);
            }),
            borderColor: '#10b981',
            tension: 0.4,
            fill: false
          }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
      });
    }

    function updateDefaults() {
      const country = document.getElementById('country').value;
      let withdrawal = 4;
      if (country === 'NZ' || country === 'AU') withdrawal = 3.8;
      if (country === 'EU') withdrawal = 3.5;
      document.getElementById('withdrawalRate').value = withdrawal;
      calculate();
    }

    // Initial calculation
    window.onload = () => {
      calculate();
    };
  </script>
</body>
</html>
