<div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- Inputs Sidebar -->
        <aside class="lg:col-span-4 space-y-6">
            <div class="card p-6 space-y-5">
                <div class="input-group">
                    <label>Current Age</label>
                    <input type="number" id="currentAge" value="30" class="input-field">
                </div>
                <div class="input-group">
                    <label>Retirement Age</label>
                    <input type="number" id="retireAge" value="65" class="input-field">
                </div>
                <div class="input-group">
                    <label>Current Savings (<span class="currency-symbol">$</span>)</label>
                    <input type="number" id="currentSavings" value="50000" class="input-field">
                </div>
                <div class="input-group">
                    <label>Monthly Contribution (<span class="currency-symbol">$</span>)</label>
                    <input type="number" id="monthlySavings" value="2000" class="input-field">
                </div>
                <div class="input-group">
                    <label>Target Monthly Retirement Spending (<span class="currency-symbol">$</span>)</label>
                    <input type="number" id="targetSpending" value="5000" class="input-field">
                </div>
                <div class="pt-4 border-t border-slate-100">
                    <div class="input-group mb-4">
                        <div class="flex justify-between">
                            <label>Annual Return %</label>
                            <span id="returnVal" class="text-sm font-bold text-indigo-600">7%</span>
                        </div>
                        <input type="range" id="returnRate" min="1" max="15" step="0.5" value="7" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                    </div>
                    <div class="input-group">
                        <div class="flex justify-between">
                            <label>Safe Withdrawal Rate %</label>
                            <span id="swrVal" class="text-sm font-bold text-indigo-600">4%</span>
                        </div>
                        <input type="range" id="swrRate" min="2" max="6" step="0.1" value="4" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="lg:col-span-8 space-y-8">
            <!-- Summary Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="card p-6 border-l-4 border-indigo-500">
                    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Your FIRE Number</p>
                    <p class="text-2xl font-bold text-slate-900 mt-1"><span class="currency-symbol">$</span><span id="fireNumber">0</span></p>
                </div>
                <div class="card p-6 border-l-4 border-emerald-500">
                    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Years to Retire</p>
                    <p class="text-2xl font-bold text-slate-900 mt-1"><span id="yearsToRetire">0</span> Years</p>
                </div>
                <div class="card p-6 border-l-4 border-amber-500">
                    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Projected Monthly Income</p>
                    <p class="text-2xl font-bold text-slate-900 mt-1"><span class="currency-symbol">$</span><span id="projectedIncome">0</span></p>
                </div>
            </div>

            <!-- Chart -->
            <div class="card p-6">
                <h3 class="text-lg font-semibold text-slate-800 mb-4">Wealth Accumulation Forecast</h3>
                <div class="h-[400px] w-full">
                    <canvas id="growthChart"></canvas>
                </div>
            </div>

            <!-- CTA -->
            <div class="text-center py-4">
                <a href="https://example.com/invest" class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-10 rounded-xl transition shadow-lg shadow-indigo-200 text-lg">
                    Start Building My Retirement Portfolio
                </a>
            </div>
        </main>
    </div>

    <footer class="mt-12 text-center">
        <p class="text-xs text-slate-400">This is for illustration only and is not financial advice.</p>
    </footer>
</div>

<script>
    const ctx = document.getElementById('growthChart').getContext('2d');
    let chart;

    const config = {
        US: { symbol: '$', swr: 4.0, inflation: 3.0 },
        NZ: { symbol: '$', swr: 3.5, inflation: 3.0 },
        AU: { symbol: '$', swr: 3.7, inflation: 3.0 },
        UK: { symbol: '£', swr: 3.2, inflation: 2.5 },
        CA: { symbol: '$', swr: 3.5, inflation: 3.0 },
        EU: { symbol: '€', swr: 3.5, inflation: 2.0 },
        Other: { symbol: '$', swr: 4.0, inflation: 3.0 }
    };

    const inputs = ['currentAge', 'retireAge', 'currentSavings', 'monthlySavings', 'targetSpending', 'returnRate', 'swrRate', 'country'];
    
    function formatNum(num) {
        return new Intl.NumberFormat().format(Math.round(num));
    }

    function updateUI() {
        const countryCode = document.getElementById('country').value;
        const countryData = config[countryCode];
        
        // Update symbols
        document.querySelectorAll('.currency-symbol').forEach(el => el.textContent = countryData.symbol);
        
        const currentAge = parseInt(document.getElementById('currentAge').value) || 0;
        const retireAge = parseInt(document.getElementById('retireAge').value) || 0;
        const currentSavings = parseFloat(document.getElementById('currentSavings').value) || 0;
        const monthlySavings = parseFloat(document.getElementById('monthlySavings').value) || 0;
        const targetSpending = parseFloat(document.getElementById('targetSpending').value) || 0;
        const annualReturn = parseFloat(document.getElementById('returnRate').value) / 100;
        const swr = parseFloat(document.getElementById('swrRate').value) / 100;

        document.getElementById('returnVal').textContent = (annualReturn * 100).toFixed(1) + '%';
        document.getElementById('swrVal').textContent = (swr * 100).toFixed(1) + '%';

        // Calculations
        const fireNumber = (targetSpending * 12) / swr;
        const years = Math.max(0, retireAge - currentAge);
        
        let labels = [];
        let data = [];
        let balance = currentSavings;
        const monthlyReturn = Math.pow(1 + annualReturn, 1/12) - 1;

        labels.push(currentAge);
        data.push(balance);

        for (let i = 1; i <= years; i++) {
            for (let m = 0; m < 12; m++) {
                balance = (balance + monthlySavings) * (1 + monthlyReturn);
            }
            labels.push(currentAge + i);
            data.push(balance);
        }

        const finalBalance = data[data.length - 1];
        const monthlyIncome = (finalBalance * swr) / 12;

        document.getElementById('fireNumber').textContent = formatNum(fireNumber);
        document.getElementById('yearsToRetire').textContent = years;
        document.getElementById('projectedIncome').textContent = formatNum(monthlyIncome);

        updateChart(labels, data, fireNumber);
    }

    function updateChart(labels, data, fireTarget) {
        if (chart) chart.destroy();
        
        const countryCode = document.getElementById('country').value;
        const symbol = config[countryCode].symbol;

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Net Worth',
                        data: data,
                        borderColor: '#4f46e5',
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 6
                    },
                    {
                        label: 'FIRE Target',
                        data: Array(labels.length).fill(fireTarget),
                        borderColor: '#ef4444',
                        borderDash: [5, 5],
                        pointRadius: 0,
                        fill: false
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                plugins: {
                    legend: { display: true, position: 'top' },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ': ' + symbol + formatNum(context.parsed.y);
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        ticks: { callback: value => symbol + formatNum(value) },
                        grid: { color: '#f1f5f9' }
                    },
                    x: {
                        grid: { display: false },
                        title: { display: true, text: 'Age' }
                    }
                }
            }
        });
    }

    document.getElementById('country').addEventListener('change', (e) => {
        const countryData = config[e.target.value];
        document.getElementById('swrRate').value = countryData.swr;
        updateUI();
    });

    inputs.forEach(id => {
        document.getElementById(id).addEventListener('input', updateUI);
    });

    // Initial update
    updateUI();
</script>
